<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
</head>

<body>
    <h2>Student Registration Form</h2>
    <p>Please fill the right details:</p>
    <form>
        <label for="name">Name:</label><br>
        <input type="text" id="name" name="name" placeholder="Enter your name" required><br><br>

        <label for="fatherName">Father's Name:</label><br>
        <input type="text" id="fatherName" name="fatherName" placeholder="Enter your father's name" required><br><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" placeholder=" Enter your email" required><br><br>

        <label for="password">Password:</label><br>
        <input type="password" id="password" name="password" placeholder="Enter your password" minlength="8" required><br><br>

        <label for="age">Age</label><br>
        <input type="number" id="age" name="age" placeholder="Enter your age" min="18" max="120" required><br><br>

        <label for="mobile">Mobile Number:</label><br>
        <input type="tel" id="mobile" name="mobile" placeholder="Enter your mobile number" maxlength="10"
            required><br><br>

        <label for="country">Country:</label><br>
        <select id="country" name="country" required>
            <option value="">--Select Country--</option>
            <option value="India">India</option>
            <option value="USA">USA</option>
            <option value="UK">UK</option>
            <option value="Canada">Canada</option>
            <option value="Australia">Australia</option>
        </select><br><br>

        <label for="address">Address:</label><br>
        <textarea id="address" name="address" rows="7" cols="35" placeholder="Enter your address"
            required></textarea><br><br>

        <fieldset>

            <legend>Gender</legend>
            <input type="radio" id="female" name="gender" value="female" required>
            <label for="female">Female</label><br><br>

            <input type="radio" id="male" name="gender" value="male" required>
            <label for="male">Male</label><br><br>
        </fieldset>

        <fieldset>
            <legend><h2>Hobbies</h2></legend>

            <input type="checkbox" id="reading" name="hobbies" value="reading">
            <label for="reading">Reading</label><br><br>

            <input type="checkbox" id="coding" name="hobbies" value="coding">
            <label for="coding">Coding</label><br><br>

            <input type="checkbox" id="playing" name="hobbies" value="playing">
            <label for="playing">Playing</label><br><br>

            <input type="checkbox" id="Gaming" name="hobbies" value="Gaming">
            <label for="Gaming">Gaming</label><br><br>
        </fieldset>

        <input type="submit" value="Register">
        <input type="reset" value="Reset">
    </form>
</body>

</html>
